# switcheroo configuration

# Kernel-level modifier remaps (applied via hidutil on startup)
[[modifier_remap]]
from = "caps_lock"
to = "left_ctrl"

# Tap-hold: tap a modifier for one key, hold it for another
[[tap_hold]]
key = "left_ctrl"
tap = "escape"
hold = "left_ctrl"
timeout_ms = 200

# Conditional remaps: when a modifier is held, remap keys
[[conditional_remap]]
modifier = "ctrl"
from = "h"
to = "left_arrow"

[[conditional_remap]]
modifier = "ctrl"
from = "j"
to = "down_arrow"

[[conditional_remap]]
modifier = "ctrl"
from = "k"
to = "up_arrow"

[[conditional_remap]]
modifier = "ctrl"
from = "l"
to = "right_arrow"

# Chords: keys pressed simultaneously within a time window
[[chord]]
keys = ["left_shift", "right_shift"]
emit = "caps_lock"
window_ms = 200

